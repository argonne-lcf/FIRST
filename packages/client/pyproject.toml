[project]
name = "alcf-ai"
version = "0.5.0"
description = "ALCF Inference Gateway SDK"
authors = [{ name = "Misha Salim", email = "msalim@anl.gov" }]
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "first-common",
    "httpx",
    "numpy",
    "rich",
    "typer",
    "globus-sdk>=3.65.0,<4",
    "openai",
    "matplotlib",
    "Pillow",
    "tifffile",
    "smart-open",
]

[tool.uv.sources]
first-common = { workspace = true }

[project.scripts]
alcf-ai = "alcf_ai:main"

[build-system]
requires = ["uv_build<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
