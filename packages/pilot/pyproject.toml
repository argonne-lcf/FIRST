[project]
name = "first-pilot"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["first-common", "pydantic", "jinja2", "fastapi", "uvicorn[standard]", "cachetools"]

[tool.uv.sources]
first-common = { workspace = true }

[project.scripts]
first-pilot = "first_pilot.control_api:entrypoint"

[build-system]
requires = ["uv_build<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""