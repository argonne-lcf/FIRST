[project]
name = "first-gateway"
version = "0.2.0"
description = ""
authors = [{ name = "Benoit Cote", email = "bcote@anl.gov" }, { name = "Misha Salim", email = "msalim@anl.gov"}, {name = "Ethan Wong", email="ewong@anl.gov"}]
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

# Directly imported dependencies for production:
dependencies = [
    "first-common",
    "alembic",
    "globus-compute-sdk",
    "globus-sdk",
    "fastapi",
    "gunicorn",
    "httpx",
    "psycopg[binary]",
    "pydantic",
    "pydantic-settings",
    "redis",
    "python-json-logger",
    "uvicorn[standard]",
    "pyzstd",
    "SQLAlchemy[asyncio]",
]

[project.scripts]
pilot-certmanager = "first_gateway.services.certmanager.cli:app"

[tool.uv.sources]
first-common = { workspace = true }

[build-system]
requires = ["uv_build<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""