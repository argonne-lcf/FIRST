[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]

dev = [
    "mypy",
    "ruff",
    "pre-commit>=4.5.1",
    "types-PyYAML",
    "types-cachetools",
    "pytest",
    "pytest-asyncio",
    "asgi-lifespan",
]

docs = [
    "mkdocs-get-deps",
    "mkdocs-material-extensions",
    "mkdocs-material>=9.7.0,<10",
    "mkdocs-minify-plugin<0.9",
    "mkdocs>=1.5.0",
    "pymdown-extensions>=10.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = [
    "resource_server_async/migrations/*",
    "archived/*",
]

[tool.ruff.lint]
select = ["F", "I", "ARG"]

[tool.ruff.lint.per-file-ignores]
# Pytest fixtures take unused args for dependency/side-effects:
"tests/**" = ["ARG001", "ARG002"]

[tool.ruff.lint.isort]
known-first-party = ["alcf_ai", "first_common", "first_dashboard", "first_gateway", "first_pilot"]

[tool.mypy]
python_version = "3.12"
mypy_path = [
    "packages/client",
    "packages/common",
    "packages/dashboard",
    "packages/gateway",
    "packages/pilot",
    "tests",
]
packages = [
    "alcf_ai",
    "first_common",
    "first_dashboard",
    "first_gateway",
    "first_pilot",
    "tests",
]
plugins = [ "pydantic.mypy" ]
strict = true
warn_unused_configs = true
warn_unreachable = true
no_implicit_optional = true

pretty = true
show_error_codes = true
show_column_numbers = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true

[[tool.mypy.overrides]]
module = ["smart_open"]
ignore_missing_imports = true
