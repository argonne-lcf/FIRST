# Example of translating from Globus Compute config to a semi-realistic
# PilotDeployment Spec.

kind: AccessGroup
name: research-team
spec:
  allowed_groups: []
  allowed_domains: []

---

kind: Cluster
name: sophia
spec:
  status_method: first_gateway.platforms.health.get_alcf_cluster_status
  status_kwargs:
    status_url: "https://api.alcf.anl.gov/api/v1/status/resources/sophia-id"
    timeout: 10
  maintenance_notice: "Sophia is offline until tomorrow"
  pilot_system:
    scheduler_adapter: first_gateway.platforms.schedulers.GlobusComputePBSAdapter
    scheduler_config:
      endpoint_uuid: sophia-endpoint-uuid
    pilot_env_path: /eagle/inference-service/venvs/pilot/
    pilot_config_path: /eagle/inference-service/pilot-config/
    job_walltime_min: 2592000
    queue: infer-svc
    account: inference_svc
    workdir: /eagle/inference-service/pilot-workdir/
    external_port: 8443
    nginx_path: /eagle/inference-service/bin/nginx
    ip_allowlist: ["10.0.0.0/8"]
    node_file_env: PBS_NODEFILE
    submit_script_preamble: |
      #!/bin/bash
      set -eu
      module load python
    pilot_version: "0.1.0"


---

kind: Model
name: google/gemma-4-31B-it

spec:
  access_group_name: research-team
  supported_endpoints: ["/messages", "/chat/completions", "/responses"]

---
kind: Model
name: google/gemma-4-32B

spec:
  access_group_name: research-team
  supported_endpoints: ["/messages", "/chat/completions", "/responses"]
---

kind: PilotDeployment
name: sophia/pilot/google/gemma-4-31B-it

spec:
  model_name: google/gemma-4-31B-it
  cluster_name: sophia

  router_params:
    weight: 1
    max_parallel_requests: 50

  min_replicas: 1
  max_replicas: 3

  scaling_strategy:
    strategy: LoadThresholdStrategy
    scale_up_interval_min: 120
    scale_down_age_min: 7200
    scaling_thresholds:
      - [0.0, 1]
      - [10.0, 2]
      - [20.0, 3]

  health_check_method: first_gateway.platforms.health.check_health_endpoint
  health_check_kwargs:
    timeout: 10
    health_path: "/health"

  prometheus_metrics_path: "/metrics"
  prometheus_scrape_interval_sec: 30

  launch_spec:
    served_model_name: google/gemma-4-31B-it
    num_nodes: 1
    gpus_per_node: 8

    venv_path: /lus/eagle/projects/inference_service/env/vllm-0.19.0
    weights_path: /eagle/inference_service/model_weights/google/gemma-4-31B-it
    weights_cache_path: /raid/scratch/inference_service/model_weights/google/gemma-4-31B-it

    log_dir: /eagle/inference-service/logs/
    max_startup_sec: 500
    health_path: /health

    env:
      HTTP_PROXY: "http://proxy.alcf.anl.gov:3128"
      HTTPS_PROXY: "http://proxy.alcf.anl.gov:3128"
      http_proxy: "http://proxy.alcf.anl.gov:3128"
      https_proxy: "http://proxy.alcf.anl.gov:3128"
      ftp_proxy: "http://proxy.alcf.anl.gov:3128"
      TRANSFORMERS_OFFLINE: "1"
      OMP_NUM_THREADS: "4"
      VLLM_LOG_LEVEL: "WARN"
      USE_FASTSAFETENSOR: "true"
      VLLM_IMAGE_FETCH_TIMEOUT: "60"
      VLLM_USE_RAY_COMPILED_DAG_CHANNEL_TYPE: "shm"
      TORCHINDUCTOR_CACHE_DIR: "/raid/scratch/inference_service/model_weights/.cache/torch_inductor"
      VLLM_CACHE_ROOT: "/raid/scratch/inference_service/model_weights/.cache/vllm"
      TRITON_CACHE_DIR: "/raid/scratch/inference_service/model_weights/.cache/triton"

    serve_script_template: |
      #!/bin/bash
      set -euo pipefail

      ulimit -c unlimited
      mkdir -p "$TORCHINDUCTOR_CACHE_DIR" "$VLLM_CACHE_ROOT" "$TRITON_CACHE_DIR"

      source {{ quote(venv_path) }}/bin/activate

      exec vllm serve {{ quote(weights_cache_path) }} \
        --served-model-name {{ quote(served_model_name) }} \
        --host 127.0.0.1 \
        --port {{ port }} \
        --enable-auto-tool-choice \
        --tool-call-parser gemma4 \
        --reasoning-parser gemma4 \
        --async-scheduling \
        --tensor-parallel-size {{ gpus_per_node }} \
        --max-model-len 262144 \
        --trust-remote-code \
        --gpu-memory-utilization 0.9
