kind: AccessGroup
name: research-team
spec:
  allowed_groups: ["group:abc123"]
  allowed_domains: ["@anl.gov"]

---

kind: Cluster
name: sophia
spec:
  status_method: first_gateway.platforms.health.get_alcf_cluster_status
  status_kwargs:
    status_url: "https://api.alcf.anl.gov/api/v1/status/resources/sophia-id"
    timeout: 10
  maintenance_notice: "Sophia is operational"
  pilot_system:
    scheduler_adapter: first_gateway.platforms.schedulers.GlobusComputePBSAdapter
    scheduler_config:
      endpoint_uuid: sophia-endpoint-uuid
    pilot_env_path: /eagle/inference-service/venvs/pilot/
    pilot_config_path: /eagle/inference-service/pilot-config/
    job_walltime: 2592000
    queue: infer-svc
    account: inference_svc
    workdir: /eagle/inference-service/pilot-workdir/
    external_port: 8443
    nginx_path: /eagle/inference-service/bin/nginx
    ip_allowlist: ["10.0.0.0/8"]
    node_file_env: PBS_NODEFILE
    submit_script_preamble: |
      #!/bin/bash
      set -eu
      module load python
    pilot_version: "0.1.0"

---

kind: Model
name: meta-llama/llama-3-8b
spec:
  access_group_name: research-team
  supported_endpoints:
    - chat/completions
    - completions

---

kind: StaticDeployment
name: sophia/static/llama-3-8b
spec:
  model_name: meta-llama/llama-3-8b
  cluster_name: sophia
  upstream_model_name: s-llama-3-8b
  api_url: https://sophia.alcf.anl.gov/api/v1/
  api_key: env_var://SOPHIA_API_KEY
  router_params:
    weight: 1
    max_parallel_requests: 100
  prometheus_metrics_path: "/metrics"
  prometheus_scrape_interval: 30
  health_check_method: first_gateway.platforms.health.check_health_endpoint
  health_check_kwargs:
    timeout: 10
    health_path: "/health"

---

kind: PilotDeployment
name: sophia/pilot/llama-3-8b
spec:
  model_name: meta-llama/llama-3-8b
  cluster_name: sophia
  router_params:
    weight: 1
    max_parallel_requests: 50
  min_replicas: 1
  max_replicas: 3
  scaling_strategy:
    strategy: LoadThresholdStrategy
    scale_up_interval: 120
    min_scale_down_age: 7200
    scaling_thresholds:
      - [0.0, 1]
      - [10.0, 2]
      - [20.0, 3]
  health_check_method: first_gateway.platforms.health.check_health_endpoint
  health_check_kwargs:
    timeout: 10
    health_path: "/health"
  prometheus_metrics_path: "/metrics"
  prometheus_scrape_interval: 30
  launch_spec:
    served_model_name: meta-llama/llama-3-8b
    num_nodes: 1
    num_gpus: 8
    venv_path: /eagle/inference-service/venvs/vllm/
    weights_path: /eagle/inference-service/weights/llama-3-8b/
    weights_cache_path: /raid/scratch/weights-cache/llama-3-8b/
    env:
      FOO: "bar"
    serve_script_template: |
      vllm serve {{weights_path}}
    log_dir: /eagle/inference-service/logs/
    max_startup_time: 900

---

kind: AccessGroup
name: public
spec:
  allowed_groups: []
  allowed_domains: []

---

kind: Cluster
name: metis
spec:
  status_method: first_gateway.platforms.health.get_metis_cluster_status
  status_kwargs:
    status_url: "https://metis.alcf.anl.gov/status"
    timeout: 4

---

kind: Model
name: mistralai/mistral-7b
spec:
  access_group_name: public
  supported_endpoints:
    - chat/completions

---

kind: PilotDeployment
name: sophia/pilot/mistral-7b
spec:
  model_name: mistralai/mistral-7b
  cluster_name: sophia
  router_params:
    weight: 1
    max_parallel_requests: 50
  min_replicas: 1
  max_replicas: 2
  scaling_strategy:
    strategy: LoadThresholdStrategy
    scale_up_interval: 120
    min_scale_down_age: 7200
    scaling_thresholds:
      - [0.0, 1]
      - [15.0, 2]
  health_check_method: first_gateway.platforms.health.check_health_endpoint
  health_check_kwargs:
    timeout: 10
    health_path: "/health"
  prometheus_metrics_path: "/metrics"
  prometheus_scrape_interval: 30
  launch_spec:
    served_model_name: mistralai/mistral-7b
    num_nodes: 1
    num_gpus: 4
    venv_path: /eagle/inference-service/venvs/vllm/
    weights_path: /eagle/inference-service/weights/mistral-7b/
    weights_cache_path: /raid/scratch/weights-cache/mistral-7b/
    env: {}
    serve_script_template: |
      vllm serve {{weights_path}}
    log_dir: /eagle/inference-service/logs/
    max_startup_time: 600
